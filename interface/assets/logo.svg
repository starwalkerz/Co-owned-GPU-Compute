<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a472a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#74c69d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40916c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#74c69d;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a472a" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f5f7fb" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="565" stroke-dashoffset="0"/>

  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="471" stroke-dashoffset="118" opacity="0.6"/>

  <!-- GPU chip / processor shape (center) -->
  <rect x="55" y="55" width="90" height="90" rx="12" fill="url(#primaryGrad)" filter="url(#glow)"/>

  <!-- Chip inner pattern -->
  <rect x="70" y="70" width="60" height="60" rx="6" fill="#1a472a" opacity="0.8"/>

  <!-- Chip core -->
  <rect x="82" y="82" width="36" height="36" rx="4" fill="url(#accentGrad)"/>

  <!-- Circuit traces - top -->
  <line x1="100" y1="40" x2="100" y2="55" stroke="#74c69d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="38" r="3" fill="#74c69d"/>

  <!-- Circuit traces - bottom -->
  <line x1="100" y1="145" x2="100" y2="160" stroke="#74c69d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="162" r="3" fill="#74c69d"/>

  <!-- Circuit traces - left -->
  <line x1="40" y1="100" x2="55" y2="100" stroke="#74c69d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="38" cy="100" r="3" fill="#74c69d"/>

  <!-- Circuit traces - right -->
  <line x1="145" y1="100" x2="160" y2="100" stroke="#74c69d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="162" cy="100" r="3" fill="#74c69d"/>

  <!-- Diagonal circuit traces - top-left -->
  <line x1="60" y1="60" x2="70" y2="70" stroke="#74c69d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Diagonal circuit traces - top-right -->
  <line x1="140" y1="60" x2="130" y2="70" stroke="#74c69d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Diagonal circuit traces - bottom-left -->
  <line x1="60" y1="140" x2="70" y2="130" stroke="#74c69d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Diagonal circuit traces - bottom-right -->
  <line x1="140" y1="140" x2="130" y2="130" stroke="#74c69d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Small connection dots -->
  <circle cx="70" cy="70" r="2" fill="#74c69d" opacity="0.9"/>
  <circle cx="130" cy="70" r="2" fill="#74c69d" opacity="0.9"/>
  <circle cx="70" cy="130" r="2" fill="#74c69d" opacity="0.9"/>
  <circle cx="130" cy="130" r="2" fill="#74c69d" opacity="0.9"/>

  <!-- Data flow arrows (clockwise) -->
  <polygon points="185,50 195,55 185,60" fill="#74c69d" opacity="0.7"/>
  <polygon points="15,140 5,145 15,150" fill="#74c69d" opacity="0.7"/>

  <!-- Inner text "HPC" -->
  <text x="100" y="130" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="#f5f7fb" letter-spacing="2">
    HPC
  </text>

  <!-- Small "SHARE" text below -->
  <text x="100" y="148" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="8" font-weight="600" fill="#74c69d" letter-spacing="3" opacity="0.9">
    SHARE
  </text>

  <!-- Sparkle / node indicator -->
  <circle cx="170" cy="35" r="2" fill="#74c69d" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="165" r="1.5" fill="#74c69d" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer ring data pulse (animation) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#74c69d" stroke-width="1" opacity="0">
    <animate attributeName="r" values="90;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#74c69d" stroke-width="1" opacity="0">
    <animate attributeName="r" values="90;105" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>